<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket MVP</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; padding: 20px; line-height: 1.5; color: #333; max-width: 900px; margin: 0 auto; }
        h1, h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: 600; }
        tr:hover { background-color: #f1f3f5; }
        .hero { background: #e9ecef; padding: 30px; border-radius: 8px; margin-bottom: 30px; }
        .btn { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background-color: #0056b3; }
        form { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Supermarket Management System</h1>
        <p>This is the Hybrid web MVP interfacing directly with the embedded C core logic.</p>
        <button class="btn" onclick="fetchProducts()">Refresh Products</button>
    </div>

    <h2>Inventory Dashboard</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Supplier</th>
                <th>Price ($)</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="product-list">
            <tr><td colspan="6">Loading products...</td></tr>
        </tbody>
    </table>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const list = document.getElementById('product-list');
                list.innerHTML = '';
                
                if (products.length === 0) {
                    list.innerHTML = '<tr><td colspan="6">No products found.</td></tr>';
                    return;
                }
                
                products.forEach(p => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.category}</td>
                        <td>${p.supplier}</td>
                        <td>$${p.price.toFixed(2)}</td>
                        <td>${p.stock}</td>
                    `;
                    list.appendChild(row);
                });
            } catch (err) {
                console.error('Error fetching APIs:', err);
                document.getElementById('product-list').innerHTML = `<tr><td colspan="6" style="color:red">Failed to load data. Is the server running?</td></tr>`;
            }
        }

        // Fetch on load
        fetchProducts();
    </script>
</body>
</html>
